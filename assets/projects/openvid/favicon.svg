<svg width="470" height="465" viewBox="0 0 470 465" fill="none" xmlns="http://www.w3.org/2000/svg">
<style>
  @keyframes playPulse {
    0%, 100% { 
      transform: scale(1);
      opacity: 1;
    }
    50% { 
      transform: scale(1.05);
      opacity: 0.8;
    }
  }
  
  @keyframes gradientShift {
    0%, 100% { 
      stop-color: #011D2D;
    }
    50% { 
      stop-color: #024a6b;
    }
  }
  
  @keyframes gradientShiftEnd {
    0%, 100% { 
      stop-opacity: 0.15;
    }
    50% { 
      stop-opacity: 0.35;
    }
  }
  
  @keyframes dashAnimation {
    0% {
      stroke-dashoffset: 2000;
    }
    100% {
      stroke-dashoffset: 0;
    }
  }
  
  @keyframes glow {
    0%, 100% {
      filter: drop-shadow(0 0 2px rgba(1, 29, 45, 0.5));
    }
    50% {
      filter: drop-shadow(0 0 8px rgba(1, 29, 45, 0.6)) drop-shadow(0 0 12px rgba(255, 255, 255, 0.7));
    }
  }
  
  .play-icon {
    animation: playPulse 2.5s ease-in-out infinite;
    transform-origin: center;
  }
  
  .main-path {
    stroke-dasharray: 2000;
    stroke-dashoffset: 2000;
    animation: 
      dashAnimation 2s ease-out forwards,
      glow 2.5s ease-in-out infinite 2s;
  }
  
  .gradient-start {
    animation: gradientShift 2.5s ease-in-out infinite;
  }
  
  .gradient-end {
    animation: gradientShiftEnd 2.5s ease-in-out infinite;
  }
</style>

